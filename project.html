<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Titre de l'onglet — mis à jour dynamiquement par JavaScript (renderProject dans app.js)
       avec le format "NOM DU PROJET — Thomas Abate" -->
  <title>Project — Thomas Abate</title>
  <meta name="description" content="Project case study — Thomas Abate portfolio.">

  <link rel="icon" type="image/png" href="Site_Web_Ico/Logo%20Web.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

  <div class="page-transition" id="pageTransition"></div>

  <!-- ════════════════════════════════════════════════════════════════════════
       NAVIGATION — Identique sur toutes les pages
       ════════════════════════════════════════════════════════════════════════ -->
  <nav>
    <a class="nav-logo" href="index.html">Thomas Abate</a>
    <ul class="nav-links" id="navList">
      <li><a href="index.html">Home</a></li>
      <li><a href="works.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="about.html#cv">CV</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ════════════════════════════════════════════════════════════════════════
       LIEN RETOUR — "← All Projects"
       Ramène à la page Works. Styles dans .back-link dans style.css.
       ← MODIFIABLE : changer le texte "All Projects" si besoin
       ════════════════════════════════════════════════════════════════════════ -->
  <!-- ════════════════════════════════════════════════════════════════════════
       BANNIÈRE DU PROJET — Image + Gradient + Texte superposé
       Tout le contenu est injecté par renderProject() dans app.js.
       ════════════════════════════════════════════════════════════════════════ -->
  <div class="project-banner" id="projectBanner">
    <!-- Image de la bannière — src="" rempli par JavaScript -->
    <img src="" alt="">

    <!-- Dégradé en fondu de l'image vers la couleur de fond (défini dans style.css) -->
    <div class="project-banner-gradient"></div>

    <!-- Lien retour positionné en haut de la bannière -->
    <a class="back-link" href="works.html">
      <svg width="20" height="14" viewBox="0 0 14 10" fill="none">
        <path d="M13 5H1M6 1L2 5l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      All Projects
    </a>

    <!-- Texte positionné en bas de la bannière -->
    <div class="project-banner-content">
      <div class="project-tag" id="projectTag"></div>
      <h1 class="project-title" id="projectTitle"></h1>
      <p class="project-subtitle" id="projectSubtitle"></p>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════════════
       CORPS DU PROJET — Deux colonnes : description + sidebar
       - Colonne principale : texte d'intro + liste de points clés (bullets)
       - Sidebar : métadonnées rapides (catégorie, année, moteur)
       Passe à 1 colonne sur tablette (CSS @media max-width: 1100px)
       ════════════════════════════════════════════════════════════════════════ -->
  <div class="project-body">

    <!-- ── Description principale ─────────────────────────────────────────
         - id="projectIntro"   : paragraphe d'intro injecté par JavaScript
         - id="projectBullets" : liste des points clés injectée par JavaScript
         Les données viennent des champs "intro" et "bullets" dans data.js -->
    <div class="project-description">
      <p class="project-intro" id="projectIntro"></p>
      <ul class="project-bullets" id="projectBullets">
        <!-- Les <li class="bullet-item"> sont créés par renderProject() dans app.js -->
      </ul>
    </div>

    <!-- ── Sidebar : informations rapides ─────────────────────────────────
         - id="sideCategory" : injecté par JavaScript depuis project.categoryLabel
         - id="sideYear"     : injecté par JavaScript depuis project.year
         POUR AJOUTER UNE INFO dans la sidebar :
           1. Ajouter un bloc <div class="sidebar-block">...</div> ici
           2. Donner un id au .sidebar-value
           3. Appeler setText('monId', project.maValeur) dans renderProject() dans app.js -->
    <aside class="project-sidebar">
      <div class="sidebar-block">
        <div class="sidebar-label">Category</div>
        <div class="sidebar-value" id="sideCategory"></div><!-- Ex: "Game Jam" -->
      </div>
      <div class="sidebar-block">
        <div class="sidebar-label">Year</div>
        <div class="sidebar-value" id="sideYear"></div><!-- Ex: "2024" -->
      </div>
      <!-- Moteur de jeu — affiché en dur (tous les projets utilisent UE5)
           POUR MODIFIER : changer le texte ou l'image du logo ← MODIFIABLE -->
      <div class="sidebar-block">
        <div class="sidebar-label">Engine</div>
        <div class="sidebar-value sidebar-engine">
          <img class="ue-logo" src="picture/icons-unreal-engine-500.png" alt="Unreal Engine" aria-hidden="true">
          Unreal Engine 5
        </div>
      </div>
    </aside>
  </div>

  <!-- ════════════════════════════════════════════════════════════════════════
       SECTION TRAILER — Vidéo YouTube du projet
       - L'iframe est chargée paresseusement par initLazyVideo() dans app.js
       - Si project.trailerID est null, cette section est cachée par JavaScript
       ════════════════════════════════════════════════════════════════════════ -->
  <div class="project-trailer-wrap" id="trailerSection">
    <!-- Label au-dessus ← MODIFIABLE -->
    <div class="section-sublabel">Gameplay Trailer</div>
    <!-- Boîte ratio 16:9 — l'iframe occupe 100% en position absolue -->
    <div class="trailer-box">
      <!-- src="" = vide par défaut, rempli par initLazyVideo() dans app.js -->
      <iframe id="trailerFrame" src="" title="Project trailer" allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
      </iframe>
      <!-- Placeholder affiché si pas de trailerID — caché par JS quand une vidéo existe -->
      <div class="trailer-placeholder" id="trailerPlaceholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span>Gameplay footage coming soon</span>
      </div>
    </div>
  </div>

  <!-- Deuxième vidéo optionnelle — cachée si trailerID2 absent dans data.js -->
  <div class="project-trailer-wrap" id="trailerSection2" style="display:none">
    <div class="section-sublabel">Gameplay Video</div>
    <div class="trailer-box">
      <iframe id="trailerFrame2" src="" title="Project video 2" allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
      </iframe>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════════════
       SECTION GALERIE — Carrousel d'images
       - Les slides sont injectés par renderProject() dans app.js
       - Si project.gallery est vide [], cette section est cachée par JavaScript
       - Un clic sur une image ouvre la lightbox
       ════════════════════════════════════════════════════════════════════════ -->
  <div class="project-gallery-wrap" id="gallerySection">
    <!-- Label au-dessus ← MODIFIABLE -->
    <div class="section-sublabel">Gallery</div>
    <div class="gallery-grid" id="galleryGrid">
      <!-- Le filmstrip (piste défilante + boutons flèches + compteur) est créé par app.js -->
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════════════
       NAVIGATION ENTRE PROJETS — Boutons Précédent / Suivant
       - Les href et textes sont mis à jour par renderProject() dans app.js
       - Le bouton est caché (visibility: hidden) s'il n'y a pas de projet adjacent
       ════════════════════════════════════════════════════════════════════════ -->
  <div class="divider" style="margin:0 56px"></div>
  <div class="project-nav">
    <!-- Bouton "← Projet précédent" -->
    <a class="btn-filled" id="prevProject" href="works.html">
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
        <path d="M13 5H1M6 1L2 5l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Previous Project
    </a>
    <!-- Bouton "Projet suivant →" -->
    <a class="btn-filled" id="nextProject" href="works.html">
      Next Project
      <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
        <path d="M1 5h12M8 1l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>


  <button id="scrollTopBtn" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>
  </button>

  <!-- data.js doit être chargé avant app.js -->
  <script src="js/data.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
  <script src="js/boids.js?v=4"></script>
</body>
</html>
