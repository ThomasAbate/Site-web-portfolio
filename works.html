<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Titre de l'onglet ← MODIFIABLE -->
  <title>Works — Thomas Abate</title>
  <meta name="description" content="All projects by Thomas Abate — Game Jam, Personal, and School projects in Unreal Engine.">

  <link rel="icon" type="image/png" href="Site_Web_Ico/Logo%20Web.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

  <div class="page-transition" id="pageTransition"></div>

  <!-- ════════════════════════════════════════════════════════════════════════
       NAVIGATION — Identique sur toutes les pages
       ════════════════════════════════════════════════════════════════════════ -->
  <nav>
    <a class="nav-logo" href="index.html">Thomas Abate</a>
    <ul class="nav-links" id="navList">
      <li><a href="index.html">Home</a></li>
      <li><a href="works.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="about.html#cv">CV</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ════════════════════════════════════════════════════════════════════════
       EN-TÊTE DE LA PAGE WORKS — Titre + Barre de filtres
       ════════════════════════════════════════════════════════════════════════ -->
  <header class="works-header">
    <!-- Petit label au-dessus du titre ← MODIFIABLE -->
    <div class="section-tag">Portfolio</div>

    <!-- Titre de la page — mis à jour dynamiquement par JavaScript quand on filtre
         id="worksPageTitle" est requis par app.js pour animer le changement de titre
         ← MODIFIABLE : changer le texte initial si besoin -->
    <h1 class="section-heading" style="margin-bottom:48px" id="worksPageTitle">All <span>Projects</span></h1>

    <!-- ── Boutons de filtre de catégorie ─────────────────────────────────
         data-cat = valeur transmise à getProjectsByCategory() dans data.js
         Valeurs possibles : 'all', 'personal', 'school', 'gamejam'
         La classe .active est gérée par JavaScript (app.js → renderWorks)
         POUR AJOUTER UNE CATÉGORIE :
           1. Ajouter un bouton ici avec le bon data-cat
           2. Ajouter la catégorie dans CATEGORY_ORDER dans data.js
           3. Ajouter le titre dans TITLES dans renderWorks() de app.js
         ← MODIFIABLE : changer le texte affiché sur les boutons -->
    <div class="filter-bar">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="personal">Personal</button>
      <button class="filter-btn" data-cat="school">School</button>
      <button class="filter-btn" data-cat="gamejam">Game Jam</button>
    </div>
  </header>

  <!-- ════════════════════════════════════════════════════════════════════════
       GRILLE DES PROJETS
       - Injectée dynamiquement par renderWorks() dans app.js
       - Les projets viennent de data.js
       - Pour modifier l'ordre/les projets : éditer data.js
       - Pour modifier le style de la grille : éditer .works-grid dans style.css
       ════════════════════════════════════════════════════════════════════════ -->
  <main class="works-grid" id="worksGrid">
    <!-- Les cartes de projets sont créées dynamiquement par app.js (renderWorks) -->
  </main>


  <button id="scrollTopBtn" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>
  </button>

  <!-- data.js doit être chargé avant app.js -->
  <script src="js/data.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
  <script src="js/boids.js?v=4"></script>
</body>
</html>
